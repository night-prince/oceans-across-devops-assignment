name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        required: true
        type: choice
        default: all
        options:
          - all
          - frontend
          - backend
          - ai
      environment:
        description: "Deployment environment"
        required: true
        type: choice
        default: dev
        options:
          - dev
          - prod

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-2' }}
  PROJECT_SLUG: ${{ vars.PROJECT_SLUG || 'oceans-across-payroll' }}

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      ai: ${{ steps.filter.outputs.ai }}
      environment: ${{ steps.setenv.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed service paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'services/frontend/**'
              - 'docker/**'
              - '.github/workflows/deploy.yml'
            backend:
              - 'services/backend/**'
              - 'app/**'
              - 'docker/**'
              - '.github/workflows/deploy.yml'
            ai:
              - 'services/ai/**'
              - 'docker/**'
              - '.github/workflows/deploy.yml'

      - name: Set target environment
        id: setenv
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
          else
            echo "environment=dev" >> "$GITHUB_OUTPUT"
          fi

  build_test_deploy:
    name: build-test-deploy-${{ matrix.service }}
    needs: detect_changes
    runs-on: ubuntu-latest
    environment: ${{ needs.detect_changes.outputs.environment }}
    strategy:
      fail-fast: false
      matrix:
        service:
          - frontend
          - backend
          - ai
    concurrency:
      group: deploy-${{ matrix.service }}-${{ needs.detect_changes.outputs.environment }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decide whether this service should run
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          SELECTED_SERVICE: ${{ github.event.inputs.service }}
          SERVICE: ${{ matrix.service }}
          FRONTEND_CHANGED: ${{ needs.detect_changes.outputs.frontend }}
          BACKEND_CHANGED: ${{ needs.detect_changes.outputs.backend }}
          AI_CHANGED: ${{ needs.detect_changes.outputs.ai }}
        run: |
          RUN_THIS=false

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$SELECTED_SERVICE" = "all" ] || [ "$SELECTED_SERVICE" = "$SERVICE" ]; then
              RUN_THIS=true
            fi
          else
            case "$SERVICE" in
              frontend)
                [ "$FRONTEND_CHANGED" = "true" ] && RUN_THIS=true
                ;;
              backend)
                [ "$BACKEND_CHANGED" = "true" ] && RUN_THIS=true
                ;;
              ai)
                [ "$AI_CHANGED" = "true" ] && RUN_THIS=true
                ;;
            esac
          fi

          echo "run_this=$RUN_THIS" >> "$GITHUB_OUTPUT"

      - name: Skip when no relevant changes exist
        if: steps.gate.outputs.run_this != 'true'
        run: echo "No deployable changes for ${{ matrix.service }}."

      - name: Build placeholder image
        if: steps.gate.outputs.run_this == 'true'
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          docker build \
            -f docker/Dockerfile \
            --build-arg APP_SERVICE="$SERVICE" \
            -t "oceans-across-${SERVICE}:${GITHUB_SHA}" \
            .

      - name: Smoke test container
        if: steps.gate.outputs.run_this == 'true'
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          docker run -d --rm \
            --name "smoke-${SERVICE}" \
            -p 8080:8080 \
            -e APP_ENVIRONMENT=test \
            "oceans-across-${SERVICE}:${GITHUB_SHA}"

          for i in $(seq 1 15); do
            if curl -fsS http://127.0.0.1:8080/health -o response.json; then
              break
            fi
            sleep 2
          done

          cat response.json
          jq -e '.status == "ok"' response.json >/dev/null
          jq -e --arg svc "$SERVICE" '.service == $svc' response.json >/dev/null

          docker stop "smoke-${SERVICE}"

      - name: Configure AWS credentials with OIDC
        if: steps.gate.outputs.run_this == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          role-session-name: gha-${{ matrix.service }}-${{ github.run_id }}

      - name: Resolve target EC2 instance
        if: steps.gate.outputs.run_this == 'true'
        id: target
        env:
          SERVICE: ${{ matrix.service }}
          DEPLOY_ENV: ${{ needs.detect_changes.outputs.environment }}
          FRONTEND_DEV_INSTANCE_ID: ${{ vars.FRONTEND_DEV_INSTANCE_ID }}
          FRONTEND_PROD_INSTANCE_ID: ${{ vars.FRONTEND_PROD_INSTANCE_ID }}
          BACKEND_DEV_INSTANCE_ID: ${{ vars.BACKEND_DEV_INSTANCE_ID }}
          BACKEND_PROD_INSTANCE_ID: ${{ vars.BACKEND_PROD_INSTANCE_ID }}
          AI_DEV_INSTANCE_ID: ${{ vars.AI_DEV_INSTANCE_ID }}
          AI_PROD_INSTANCE_ID: ${{ vars.AI_PROD_INSTANCE_ID }}
        run: |
          case "${SERVICE}:${DEPLOY_ENV}" in
            frontend:dev) TARGET_INSTANCE_ID="$FRONTEND_DEV_INSTANCE_ID" ;;
            frontend:prod) TARGET_INSTANCE_ID="$FRONTEND_PROD_INSTANCE_ID" ;;
            backend:dev) TARGET_INSTANCE_ID="$BACKEND_DEV_INSTANCE_ID" ;;
            backend:prod) TARGET_INSTANCE_ID="$BACKEND_PROD_INSTANCE_ID" ;;
            ai:dev) TARGET_INSTANCE_ID="$AI_DEV_INSTANCE_ID" ;;
            ai:prod) TARGET_INSTANCE_ID="$AI_PROD_INSTANCE_ID" ;;
            *) echo "Unsupported service/environment mapping"; exit 1 ;;
          esac

          if [ -z "$TARGET_INSTANCE_ID" ]; then
            echo "Missing target instance id for ${SERVICE}:${DEPLOY_ENV}"
            exit 1
          fi

          echo "target_instance_id=$TARGET_INSTANCE_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy with AWS Systems Manager
        if: steps.gate.outputs.run_this == 'true'
        env:
          SERVICE: ${{ matrix.service }}
          DEPLOY_ENV: ${{ needs.detect_changes.outputs.environment }}
          TARGET_INSTANCE_ID: ${{ steps.target.outputs.target_instance_id }}
          ARCHIVE_URL: https://codeload.github.com/${{ github.repository }}/tar.gz/${{ github.sha }}
        run: |
          cat > remote-deploy.sh <<'SCRIPT'
          set -euo pipefail

          SERVICE_NAME="__SERVICE_NAME__"
          DEPLOY_ENV="__DEPLOY_ENV__"
          PROJECT_SLUG="__PROJECT_SLUG__"
          ARCHIVE_URL="__ARCHIVE_URL__"
          IMAGE_TAG="__IMAGE_TAG__"

          APP_DIR="/opt/oceans-across/${SERVICE_NAME}"
          TMP_DIR="/tmp/${SERVICE_NAME}-deploy"
          ENV_FILE="/etc/oceans-across/${SERVICE_NAME}.env"
          PARAM_BASE="/${PROJECT_SLUG}/${DEPLOY_ENV}/${SERVICE_NAME}"

          sudo rm -rf "$TMP_DIR"
          mkdir -p "$TMP_DIR"
          sudo mkdir -p "$APP_DIR" /etc/oceans-across

          curl -fsSL "$ARCHIVE_URL" -o "$TMP_DIR/release.tgz"

          sudo rm -rf "${APP_DIR:?}/"*
          sudo tar -xzf "$TMP_DIR/release.tgz" --strip-components=1 -C "$APP_DIR"

          sudo touch "$ENV_FILE"
          sudo aws ssm get-parameters-by-path \
            --path "$PARAM_BASE" \
            --with-decryption \
            --recursive \
            --query 'Parameters[*].[Name,Value]' \
            --output text \
            | awk '{split($1,a,"/"); print a[length(a)] "=" $2}' \
            | sudo tee "$ENV_FILE" >/dev/null || true

          cd "$APP_DIR"

          sudo docker build \
            -f docker/Dockerfile \
            --build-arg APP_SERVICE="$SERVICE_NAME" \
            -t "oceans-across-${SERVICE_NAME}:${IMAGE_TAG}" \
            .

          sudo docker rm -f "$SERVICE_NAME" || true

          sudo docker run -d \
            --name "$SERVICE_NAME" \
            --restart unless-stopped \
            --env-file "$ENV_FILE" \
            -e APP_ENVIRONMENT="$DEPLOY_ENV" \
            -p 8080:8080 \
            "oceans-across-${SERVICE_NAME}:${IMAGE_TAG}"
          SCRIPT

          sed -i \
            -e "s|__SERVICE_NAME__|$SERVICE|g" \
            -e "s|__DEPLOY_ENV__|$DEPLOY_ENV|g" \
            -e "s|__PROJECT_SLUG__|${PROJECT_SLUG}|g" \
            -e "s|__ARCHIVE_URL__|$ARCHIVE_URL|g" \
            -e "s|__IMAGE_TAG__|${GITHUB_SHA}|g" \
            remote-deploy.sh

          jq -nc --rawfile cmd remote-deploy.sh '{commands: [$cmd]}' > ssm-params.json

          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "$TARGET_INSTANCE_ID" \
            --comment "Deploy $SERVICE ${GITHUB_SHA}" \
            --parameters file://ssm-params.json \
            --query 'Command.CommandId' \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$TARGET_INSTANCE_ID"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$TARGET_INSTANCE_ID" \
            --query 'Status' \
            --output text)

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$TARGET_INSTANCE_ID" \
            --query 'StandardOutputContent' \
            --output text || true

          if [ "$STATUS" != "Success" ]; then
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$TARGET_INSTANCE_ID" \
              --query 'StandardErrorContent' \
              --output text || true
            exit 1
          fi